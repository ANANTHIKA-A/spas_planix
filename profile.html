<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planix - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Planix</h2>
            </div>
            
            <ul class="nav-links">
                <li><a href="/dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a></li>
                <li><a href="/calendar.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Calendar
                </a></li>
                <li><a href="/planner.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    Auto Planner
                </a></li>
                <li><a href="/search.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Search
                </a></li>
                <li><a href="/analysis.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Analysis
                </a></li>
                <li><a href="/focus.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Focus Timer
                </a></li>
                <li><a href="/profile.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile
                </a></li>
            </ul>

            <div class="sidebar-footer">
                <div class="theme-toggle-wrapper nav-item">
                    <span>Theme</span>
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme"></button>
                </div>
                <button id="logout-btn" class="nav-item btn-icon" style="justify-content: flex-start; width: 100%; border-radius: 8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header animate-fade-in">
                <div>
                    <h1 class="page-title">User Profile</h1>
                    <p>Manage your personal details and app settings.</p>
                </div>
            </header>
            
            <div class="glass-panel animate-fade-in" style="animation-delay: 0.1s; max-width: 600px; margin: 0 auto; padding: 2.5rem; border-radius: 16px;">
                <div style="display: flex; flex-direction: column; align-items: center; text-align: center;">
                    <div style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-color), #8b5cf6); color: white; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; margin-bottom: 1.5rem; border: 4px solid var(--glass-border); box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                        <span id="profile-initial">U</span>
                    </div>
                    
                    <h2 id="profile-username" style="font-size: 2rem; color: var(--text-primary); margin-bottom: 0.5rem;">User Name</h2>
                    <p id="profile-email" style="font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 2rem;">user@example.com</p>
                    
                    <div style="display: flex; gap: 2rem; background: rgba(0,0,0,0.02); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass-border); width: 100%; justify-content: center; margin-bottom: 2rem;">
                        <div style="text-align: center;">
                            <div id="profile-total-tasks" style="font-size: 1.75rem; font-weight: 700; color: var(--accent-color);">0</div>
                            <div style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase;">Total Tasks</div>
                        </div>
                        <div style="width: 1px; background: var(--glass-border);"></div>
                        <div style="text-align: center;">
                            <div id="profile-completed-tasks" style="font-size: 1.75rem; font-weight: 700; color: var(--success-color);">0</div>
                            <div style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase;">Completed</div>
                        </div>
                    </div>

                    <!-- Gamification Section -->
                    <div style="width: 100%; text-align: left; background: rgba(0,0,0,0.02); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                        <h3 style="font-size: 1.25rem; color: var(--text-primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                            Level <span id="profile-level" style="color: var(--warning-color);">1</span>
                        </h3>
                        
                        <div style="margin-bottom: 1.5rem;">
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; font-weight: 600;">
                                <span>XP Progress</span>
                                <span id="profile-xp-text">0 / 100 XP</span>
                            </div>
                            <div style="width: 100%; height: 8px; background: rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden;">
                                <div id="profile-xp-bar" style="height: 100%; width: 0%; background: linear-gradient(90deg, var(--warning-color), #fbbf24); transition: width 0.3s;"></div>
                            </div>
                        </div>

                        <h4 style="font-size: 1rem; color: var(--text-primary); margin-bottom: 0.75rem;">Badges</h4>
                        <div id="profile-badges" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                            <!-- Badges injected by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="/src/profile.js"></script>
</body>
</html>
