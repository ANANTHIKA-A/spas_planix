<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planix - Focus Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 150px);
        }

        .timer-circle {
            position: relative;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 10px 40px var(--shadow-color), inset 0 0 30px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            transition: border-color 0.4s;
        }

        [data-theme="dark"] .timer-circle {
            background: rgba(0, 0, 0, 0.2);
        }

        .timer-circle.study-mode { border-color: var(--accent-color); }
        .timer-circle.break-mode { border-color: var(--success-color); }

        .time-display {
            font-size: 5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 1;
        }

        .mode-display {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .study-mode .mode-display { color: var(--accent-color); }
        .break-mode .mode-display { color: var(--success-color); }

        .timer-controls {
            display: flex;
            gap: 1rem;
        }

        .btn-control {
            padding: 0.8rem 2rem;
            border-radius: 99px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-play { background: var(--accent-color); color: white; }
        .btn-play:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(6, 182, 212, 0.4); }

        .btn-pause { background: var(--warning-color); color: white; }
        .btn-pause:hover { background: #d97706; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4); }

        .btn-reset { background: rgba(255, 255, 255, 0.5); color: var(--text-primary); border: 1px solid var(--glass-border); }
        [data-theme="dark"] .btn-reset { background: rgba(30, 41, 59, 0.5); border-color: rgba(255,255,255,0.1); }
        .btn-reset:hover { background: var(--glass-border); transform: translateY(-2px); }

        .mode-switches {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            background: var(--glass-bg);
            padding: 6px;
            border-radius: 99px;
            border: 1px solid var(--glass-border);
        }

        .mode-switch {
            padding: 0.6rem 1.5rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .mode-switch.active {
            background: var(--text-primary);
            color: var(--bg-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Planix</h2>
            </div>
            
            <ul class="nav-links">
                <li><a href="/dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a></li>
                <li><a href="/calendar.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Calendar
                </a></li>
                <li><a href="/planner.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    Auto Planner
                </a></li>
                <li><a href="/search.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Search
                </a></li>
                <li><a href="/analysis.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Analysis
                </a></li>
                <li><a href="/focus.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Focus Timer
                </a></li>
                <li><a href="/profile.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile
                </a></li>
            </ul>

            <div class="sidebar-footer">
                <div class="theme-toggle-wrapper nav-item">
                    <span>Theme</span>
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme"></button>
                </div>
                <button id="logout-btn" class="nav-item btn-icon" style="justify-content: flex-start; width: 100%; border-radius: 8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header animate-fade-in">
                <div>
                    <h1 class="page-title">Focus Timer</h1>
                    <p>Use the Pomodoro technique to study smarter, not harder.</p>
                </div>
            </header>

            <div class="timer-container animate-fade-in" style="animation-delay: 0.1s;">
                <div class="mode-switches">
                    <button id="switch-study" class="mode-switch active">Study (25m)</button>
                    <button id="switch-break" class="mode-switch">Break (5m)</button>
                </div>

                <div id="timer-ring" class="timer-circle study-mode">
                    <div id="time-display" class="time-display">25:00</div>
                    <div id="mode-text" class="mode-display">Study Focus</div>
                </div>

                <div class="timer-controls">
                    <button id="btn-toggle" class="btn-control btn-play">
                        <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        <span id="btn-text">Start</span>
                    </button>
                    <button id="btn-reset" class="btn-control btn-reset">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                    </button>
                </div>

                <div class="timer-settings animate-fade-in" style="animation-delay: 0.2s; margin-top: 2.5rem; display: flex; gap: 2rem; background: var(--glass-bg); padding: 1.25rem 2rem; border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);">
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                        <label for="study-input" style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Study Mins</label>
                        <input type="number" id="study-input" value="25" min="1" max="120" style="width: 80px; text-align: center; font-size: 1.25rem; font-weight: 700; padding: 0.5rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-primary); outline: none; transition: border-color 0.2s;">
                    </div>
                    <div style="width: 1px; background: var(--glass-border);"></div>
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                        <label for="break-input" style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Break Mins</label>
                        <input type="number" id="break-input" value="5" min="1" max="60" style="width: 80px; text-align: center; font-size: 1.25rem; font-weight: 700; padding: 0.5rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-primary); outline: none; transition: border-color 0.2s;">
                    </div>
                </div>

                <div id="guided-workflow-container" class="animate-fade-in" style="margin-top: 2rem; width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                    <button class="btn-control" id="btn-fetch-guided" style="width: 100%; background: linear-gradient(135deg, var(--accent-color), #8b5cf6); color: white; justify-content: center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                        Start Guided Workflow
                    </button>
                    <div id="guided-task-card" style="display: none; background: rgba(139, 92, 246, 0.1); border: 2px solid var(--accent-color); border-radius: 12px; padding: 1.5rem; text-align: center; width: 100%; box-shadow: 0 4px 20px rgba(139,92,246,0.2);">
                        <div style="font-size: 0.85rem; font-weight: 700; color: var(--accent-color); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px;">Intelligent Assignment</div>
                        <div id="guided-task-title" style="font-size: 1.35rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem;"></div>
                        <div id="guided-task-reason" style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.5rem;"></div>
                        <button class="btn-control" id="btn-complete-guided" style="background: var(--success-color); color: white; margin: 0 auto; padding: 0.6rem 1.5rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            Mark Complete
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="notification-container" class="notification-container"></div>

    <script type="module" src="/src/focus.js"></script>
</body>
</html>
