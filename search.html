<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planix - Search Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .tasks-list-panel {
            padding: 1.5rem;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        [data-theme="dark"] .task-item {
            background: rgba(15, 23, 42, 0.4);
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--glass-shadow);
        }

        .task-content {
            flex: 1;
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .task-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .task-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .time-remaining {
            color: var(--warning-color);
            font-weight: 600;
        }
        
        .time-overdue {
            color: var(--danger-color);
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Planix</h2>
            </div>
            
            <ul class="nav-links">
                <li><a href="/dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    Dashboard
                </a></li>
                <li><a href="/calendar.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Calendar
                </a></li>
                <li><a href="/planner.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                    Auto Planner
                </a></li>
                <li><a href="/search.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Search
                </a></li>
                <li><a href="/analysis.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Analysis
                </a></li>
                <li><a href="/focus.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Focus Timer
                </a></li>
                <li><a href="/profile.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile
                </a></li>
            </ul>

            <div class="sidebar-footer">
                <div class="theme-toggle-wrapper nav-item">
                    <span>Theme</span>
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme"></button>
                </div>
                <button id="logout-btn" class="nav-item btn-icon" style="justify-content: flex-start; width: 100%; border-radius: 8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header animate-fade-in">
                <div>
                    <h1 class="page-title">Search Tasks</h1>
                    <p>Find tasks by name, description, and date globally.</p>
                </div>
            </header>
            
            <div class="glass-panel tasks-list-panel animate-fade-in" style="animation-delay: 0.1s;">
                <div style="margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem;">
                        <div style="position: relative; width: 100%;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="task-search-input" class="form-control" placeholder="Search tasks by name or description..." style="padding-left: 2.5rem; font-size: 1.1rem; padding-top: 0.8rem; padding-bottom: 0.8rem;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <span style="color: var(--text-secondary); font-size: 0.95rem; font-weight: 500;">Filter by scheduled date:</span>
                            <div style="position: relative; flex: 1; max-width: 300px;">
                                <input type="date" id="task-date-search" class="form-control" title="Filter by date">
                            </div>
                        </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <!-- Tabs -->
                        <div class="task-tabs" style="display: flex; gap: 0.5rem;">
                            <button id="tab-all" class="btn-icon" style="padding: 0.5rem 1rem; border-radius: 99px; font-weight: 600; font-size: 0.95rem; background: var(--text-primary); color: var(--bg-color);">All Works</button>
                            <button id="tab-pending" class="btn-icon" style="padding: 0.5rem 1rem; border-radius: 99px; font-weight: 600; font-size: 0.95rem;">Pending Works</button>
                            <button id="tab-completed" class="btn-icon" style="padding: 0.5rem 1rem; border-radius: 99px; font-weight: 600; font-size: 0.95rem;">Completed Works</button>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 0.5rem;">
                        <span id="task-count" style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem;"></span>
                    </div>
                </div>
                
                <div id="tasks-container">
                    <!-- Tasks will be rendered here by JS -->
                    <div class="empty-state">
                        Loading tasks...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="notification-container" class="notification-container"></div>

    <script type="module" src="/src/search.js"></script>
</body>
</html>
